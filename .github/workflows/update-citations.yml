name: Update Scholar citation dashboard

on:
  schedule:
    - cron: '17 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Scholar profile from SerpAPI
        run: node scripts/update-citations.mjs
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: LrXokpIAAAAJ

      - name: Commit Scholar dashboard changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Scholar citation dashboard
          file_pattern: data/scholar-profile.json
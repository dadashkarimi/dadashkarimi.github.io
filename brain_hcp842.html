<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brain Tractography — HCP-842 Atlas (self-contained)</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#fff; font-family: Georgia, serif; }
  #wrap { position:relative; width:100vw; height:100vh; display:flex;
    align-items:center; justify-content:center; }
  canvas { display:block; width:100vw; height:100vh; background:white; }
  .label { position:absolute; top:18px; left:22px; color:#444; font-size:11px;
    letter-spacing:.22em; text-transform:uppercase; }
  .status { position:absolute; top:18px; right:22px; color:#777;
    font-size:11px; letter-spacing:.12em; text-align:right; line-height:1.6;
    max-width:40%; }
  .tract-name { position:absolute; top:18px; right:22px; color:#222;
    font-size:14px; font-style:italic; letter-spacing:.05em; text-align:right;
    min-height:20px; max-width:40%; }
  .legend { position:absolute; left:22px; bottom:22px; font-size:11px;
    color:#666; line-height:1.7; letter-spacing:.05em;
    background:rgba(255,255,255,.72); padding:10px 12px; border-radius:10px; }
  .legend span { display:inline-block; width:12px; height:8px;
    margin-right:7px; border-radius:3px; vertical-align:middle; }
  .ui { position:absolute; right:22px; bottom:22px; display:flex; gap:10px;
    align-items:center; }
  button { background:#111; color:white; border:0; border-radius:8px;
    padding:10px 16px; font-family:Georgia,serif; font-size:12px;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
  button:hover { background:#333; }
  button:disabled { background:#999; cursor:wait; }
  .controls-label { font-size:11px; color:#555; letter-spacing:.08em;
    text-transform:uppercase; background:rgba(255,255,255,.72);
    padding:9px 11px; border-radius:8px; }
  #loading { position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; background:#fff; color:#666; font-size:14px;
    letter-spacing:.1em; }
  #loading.hidden { display:none; }
</style>
</head>
<body>
<div id="wrap">
  <div class="label">Full Brain Tractography · HCP-842 Atlas · Sagittal</div>
  <div class="status" id="status"></div>
  <div class="tract-name" id="tractName"></div>
  <canvas id="brain"></canvas>
  <div class="legend">
    DTI orientation color<br>
    <span style="background:#ff4747"></span>red = left-right / commissural<br>
    <span style="background:#43d35f"></span>green = anterior-posterior<br>
    <span style="background:#3967ff"></span>blue = superior-inferior<br>
    <span style="background:#ee57c8"></span>pink = arcuate / association<br>
    <span style="background:#f2a13b"></span>orange = uncinate<br>
  </div>
  <div class="ui">
    <span class="controls-label" id="speedLabel">speed 1.0×</span>
    <button id="slower">−</button>
    <button id="faster">+</button>
    <button id="replay">Replay</button>
    <button id="drawAll">Draw all</button>
  </div>
  <div id="loading">Decoding embedded HCP-842 atlas data…</div>
</div>

// ---------------------------------------------------------------------
// DECODE: base64 → bytes → gunzip → binary → bundle objects
// ---------------------------------------------------------------------
function base64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function gunzip(bytes) {
  // DecompressionStream is supported in all modern browsers (Chrome 80+,
  // Firefox 113+, Safari 16.4+). For older browsers we'd need a JS gunzip.
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const buf = await new Response(stream).arrayBuffer();
  return new Uint8Array(buf);
}

function decodeBinary(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let p = 0;
  // magic
  const magic = String.fromCharCode(bytes[p++], bytes[p++], bytes[p++], bytes[p++]);
  if (magic !== 'HCPB') throw new Error('Bad magic: ' + magic);
  const version = bytes[p++];
  if (version !== 1) throw new Error('Unsupported version: ' + version);
  const nBundles = bytes[p++];

  const dec = new TextDecoder();
  const readStr = () => {
    const n = bytes[p++];
    const s = dec.decode(bytes.subarray(p, p + n));
    p += n;
    return s;
  };

  const bundles = [];
  for (let b = 0; b < nBundles; b++) {
    const colorIdx = bytes[p++];
    const nLines = dv.getUint16(p, true); p += 2;
    const name = readStr();
    const display = readStr();
    const lines = new Array(nLines);
    for (let i = 0; i < nLines; i++) {
      const nPts = bytes[p++];
      // Use a Float32Array for fast rendering later
      const pts = new Float32Array(nPts * 2);
      for (let j = 0; j < nPts; j++) {
        pts[j*2]     = dv.getInt16(p, true) / 10; p += 2;
        pts[j*2 + 1] = dv.getInt16(p, true) / 10; p += 2;
      }
      lines[i] = pts;
    }
    bundles.push({
      name, display_name: display,
      color: COLORS[colorIdx] || 'purple',
      streamlines: lines,
    });
  }
  return bundles;
}

// ---------------------------------------------------------------------
// CANVAS + COORDINATE SYSTEM
// ---------------------------------------------------------------------
const canvas = document.getElementById('brain');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const tractNameEl = document.getElementById('tractName');
const loadingEl = document.getElementById('loading');
const speedLabel = document.getElementById('speedLabel');

const COORD_W = 480, COORD_H = 360;
let W = 0, H = 0, DPR = 1, fit = { scale: 1, tx: 0, ty: 0 };

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const pad = 70;
  const s = Math.min((W - pad*2) / COORD_W, (H - pad*2) / COORD_H);
  fit.scale = s;
  fit.tx = (W - COORD_W * s) / 2;
  fit.ty = (H - COORD_H * s) / 2;
}
function sx(x) { return fit.tx + x * fit.scale; }
function sy(y) { return fit.ty + y * fit.scale; }

function clearCanvas() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
}

// ---------------------------------------------------------------------
// RENDERER — animate one bundle at a time, streamline-by-streamline,
// each streamline draws progressively along its arc length.
// ---------------------------------------------------------------------
let bundles = null;
let speed = 1.0;
let activeBundleIdx = 0;
let activeBundleStartTime = 0;
let drawnFractionPerStreamline = null; // Float32Array sized to current bundle
let raf = null;

function updateHeaderLayout() {
  const statusBottom = statusEl.offsetTop + statusEl.offsetHeight;
  tractNameEl.style.top = (statusBottom + 8) + 'px';
}

const STREAMLINE_DURATION_MS = 600;  // each individual streamline takes ~0.6s
const BUNDLE_OVERLAP = 0.65;          // streamlines start while previous is still drawing
const BETWEEN_BUNDLE_PAUSE_MS = 250;

function startAnimation() {
  cancelAnimationFrame(raf);
  clearCanvas();
  activeBundleIdx = 0;
  beginBundle();
}

function beginBundle() {
  if (activeBundleIdx >= bundles.length) {
    tractNameEl.textContent = '✓ complete · ' + bundles.length + ' bundles · ' +
      bundles.reduce((s,b)=>s+b.streamlines.length, 0).toLocaleString() + ' streamlines';
    updateHeaderLayout();
    return;
  }
  const b = bundles[activeBundleIdx];
  tractNameEl.textContent = b.display_name + '  (' + b.streamlines.length + ' streamlines)';
  updateHeaderLayout();
  drawnFractionPerStreamline = new Float32Array(b.streamlines.length);
  activeBundleStartTime = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(now) {
  const b = bundles[activeBundleIdx];
  const n = b.streamlines.length;
  const elapsed = (now - activeBundleStartTime) * speed;

  // Stagger streamline start times so they fan in over the bundle duration
  const totalBundleMs = STREAMLINE_DURATION_MS + (n - 1) * (STREAMLINE_DURATION_MS * (1 - BUNDLE_OVERLAP) / Math.max(1, n));
  // simpler model: stagger by (totalDuration - perStreamline) / n
  const stagger = Math.max(1, (1500 + n * 1.2) - STREAMLINE_DURATION_MS) / Math.max(1, n);

  ctx.strokeStyle = PALETTE[b.color] || '#888';
  ctx.lineWidth = 0.75;

  let allDone = true;
  for (let i = 0; i < n; i++) {
    const myStart = i * stagger;
    if (elapsed < myStart) { allDone = false; continue; }
    const myT = Math.min(1, (elapsed - myStart) / STREAMLINE_DURATION_MS);
    if (myT < 1) allDone = false;
    if (myT <= drawnFractionPerStreamline[i]) continue;
    drawStreamlineSegment(b.streamlines[i], drawnFractionPerStreamline[i], myT);
    drawnFractionPerStreamline[i] = myT;
  }

  if (allDone) {
    activeBundleIdx++;
    setTimeout(beginBundle, BETWEEN_BUNDLE_PAUSE_MS / speed);
  } else {
    raf = requestAnimationFrame(tick);
  }
}

function drawStreamlineSegment(pts, t0, t1) {
  // pts is Float32Array [x0,y0,x1,y1,...]
  const nPts = pts.length / 2;
  // The streamline draws progressively from one end to the other.
  // We compute integer index ranges and draw line segments between them.
  const i0 = Math.floor(t0 * (nPts - 1));
  const i1 = Math.ceil(t1 * (nPts - 1));
  if (i1 <= i0) return;
  ctx.globalAlpha = 0.58;
  ctx.beginPath();
  ctx.moveTo(sx(pts[i0*2]), sy(pts[i0*2 + 1]));
  for (let i = i0 + 1; i <= i1 && i < nPts; i++) {
    ctx.lineTo(sx(pts[i*2]), sy(pts[i*2 + 1]));
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawAll() {
  cancelAnimationFrame(raf);
  clearCanvas();
  for (const b of bundles) {
    ctx.strokeStyle = PALETTE[b.color] || '#888';
    ctx.lineWidth = 0.75;
    ctx.globalAlpha = 0.58;
    for (const pts of b.streamlines) {
      const nPts = pts.length / 2;
      ctx.beginPath();
      ctx.moveTo(sx(pts[0]), sy(pts[1]));
      for (let i = 1; i < nPts; i++) {
        ctx.lineTo(sx(pts[i*2]), sy(pts[i*2 + 1]));
      }
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  activeBundleIdx = bundles.length;
  tractNameEl.textContent = '✓ complete · ' + bundles.length + ' bundles · ' +
    bundles.reduce((s,b)=>s+b.streamlines.length, 0).toLocaleString() + ' streamlines';
  updateHeaderLayout();
}

// ---------------------------------------------------------------------
// BOOT
// ---------------------------------------------------------------------
async function boot() {
  resize();
  try {
    const gz = base64ToBytes(EMBEDDED_DATA_B64);
    statusEl.textContent = 'Decompressing ' + (gz.length/1024).toFixed(0) + ' KB…';
    updateHeaderLayout();
    const raw = await gunzip(gz);
    bundles = decodeBinary(raw);
    const total = bundles.reduce((s,b)=>s+b.streamlines.length, 0);
    statusEl.innerHTML =
      'HCP-842 atlas · sagittal projection<br>' +
      bundles.length + ' bundles · ' + total.toLocaleString() + ' streamlines<br>' +
      '(embedded, self-contained)';
    updateHeaderLayout();
    loadingEl.classList.add('hidden');
    startAnimation();
  } catch (err) {
    loadingEl.textContent = 'Failed to decode atlas data: ' + err.message;
    console.error(err);
  }
}

window.addEventListener('resize', () => {
  resize();
  updateHeaderLayout();
  // Re-render in-place
  if (bundles) {
    clearCanvas();
    // Redraw what's been drawn so far for completed bundles
    for (let bi = 0; bi < activeBundleIdx && bi < bundles.length; bi++) {
      const b = bundles[bi];
      ctx.strokeStyle = PALETTE[b.color] || '#888';
      ctx.lineWidth = 0.75;
      ctx.globalAlpha = 0.58;
      for (const pts of b.streamlines) {
        const nPts = pts.length / 2;
        ctx.beginPath();
        ctx.moveTo(sx(pts[0]), sy(pts[1]));
        for (let i = 1; i < nPts; i++) ctx.lineTo(sx(pts[i*2]), sy(pts[i*2 + 1]));
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }
});

document.getElementById('replay').addEventListener('click', startAnimation);
document.getElementById('drawAll').addEventListener('click', drawAll);
document.getElementById('faster').addEventListener('click', () => {
  speed = Math.min(8, speed * 1.5);
  speedLabel.textContent = 'speed ' + speed.toFixed(1) + '×';
});
document.getElementById('slower').addEventListener('click', () => {
  speed = Math.max(0.25, speed / 1.5);
  speedLabel.textContent = 'speed ' + speed.toFixed(1) + '×';
});

boot();
</script>
</body>
</html>
